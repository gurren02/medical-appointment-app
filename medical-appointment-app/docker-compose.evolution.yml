version: '3.9'

services:
  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: evolution-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_API_KEY=4224702241-4c3a-1011-911c-1c0c2121
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:password@evolution-db:5432/evolution?sslmode=disable
      - DATABASE_SAVE_DATA_INSTANCE=true
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://evolution-redis:6379
      - INSTANCE_INTERVAL=5000
      - INSTANCE_SEND_PRESENCE=true
    depends_on:
      - evolution-db
      - evolution-redis
    volumes:
      - evolution_instances:/evolution/instances

  evolution-manager:
    image: evoapicloud/evolution-manager:latest
    container_name: evolution-manager
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - evolution-api

  evolution-db:
    image: postgres:15-alpine
    container_name: evolution-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=evolution
    volumes:
      - evolution_postgres_data:/var/lib/postgresql/data

  evolution-redis:
    image: redis:alpine
    container_name: evolution-redis
    restart: unless-stopped

volumes:
  evolution_postgres_data:
  evolution_instances:
